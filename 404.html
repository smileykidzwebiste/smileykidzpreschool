<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Smily Kidz Pre-School</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FDFBF7 0%, #FFF5D1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2D3748;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 520px; }
        .emoji { font-size: 6rem; margin-bottom: 1rem; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
        }
        h1 span { color: #FF6B6B; }
        p { font-size: 1.15rem; color: #4A5568; line-height: 1.7; margin-bottom: 2rem; }
        a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #FFB800;
            color: #2D3748;
            padding: 1rem 2rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(255, 184, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 184, 0, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🧸</div>
        <h1>Oops! Page <span>Not Found</span></h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back to where the smiles are!</p>
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
